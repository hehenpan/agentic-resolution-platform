version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: platform_nginx_prod
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api_server
    networks:
      - platform-network

  frontend:
    build:
      context: ..
      dockerfile: deploy/dockerfiles/frontend.prod.Dockerfile
    container_name: platform_frontend_prod
    ports:
      - "127.0.0.1:3000:3000"  # Secure loopback mapping (accessible on host only)
    # No volume mapping for code in production
    networks:
      - platform-network

  api_server:
    build:
      context: ..
      dockerfile: deploy/dockerfiles/api_server.Dockerfile
    container_name: platform_api_server_prod
    ports:
      - "127.0.0.1:8000:8000"  # Secure loopback mapping
    volumes:
      # Only mount database and uploads folder, DO NOT mount local code in production
      - ../data/prod/api_server:/app/data
    environment:
      - APP_ENV=prod
    depends_on:
      - ai_agent
    networks:
      - platform-network

  ai_agent:
    build:
      context: ..
      dockerfile: deploy/dockerfiles/ai_agent.Dockerfile
    container_name: platform_ai_agent_prod
    ports:
      - "127.0.0.1:2024:2024"  # Secure loopback mapping
    volumes:
      # Only mount database checkpoints and vector DB, DO NOT mount local code
      - ../data/prod/ai_agent:/app/data
    environment:
      - APP_ENV=prod
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    depends_on:
      - mcp_server
    networks:
      - platform-network

  mcp_server:
    build:
      context: ..
      dockerfile: deploy/dockerfiles/mcp_server.Dockerfile
    container_name: platform_mcp_server_prod
    ports:
      - "127.0.0.1:8500:8500"  # Secure loopback mapping
    volumes:
      # Only mount database, DO NOT mount local code
      - ../data/prod/mcp_server:/app/data
    environment:
      - APP_ENV=prod
    networks:
      - platform-network

networks:
  platform-network:
    name: platform_network_prod
    driver: bridge
